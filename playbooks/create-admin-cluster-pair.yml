---
- name: Create Admin Cluster Pair for Portworx
  hosts: localhost
  connection: local

  vars:
    primary_kubeconfig: ""
    secondary_kubeconfig: ""
    aws_access_key_id: ""
    aws_secret_access_key: ""
    s3_region: "us-east-2"
    s3_endpoint: "minio.minio.svc.cluster.local:9000"
    portworx_namespace: "portworx"
    cluster_pair_name: "admin-cluster-pair"

  tasks:
    - name: Create admin cluster pair
      ansible.builtin.include_role:
        name: create-cluster-pair
      vars:
        target_namespace: "{{ portworx_namespace }}"
