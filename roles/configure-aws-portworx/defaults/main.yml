px_clouddrive_policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - ec2:AttachVolume
        - ec2:ModifyVolume
        - ec2:DetachVolume
        - ec2:CreateTags
        - ec2:CreateVolume
        - ec2:DeleteTags
        - ec2:DeleteVolume
        - ec2:DescribeTags
        - ec2:DescribeVolumeAttribute
        - ec2:DescribeVolumesModifications
        - ec2:DescribeVolumeStatus
        - ec2:DescribeVolumes
        - ec2:DescribeInstances
        - autoscaling:DescribeAutoScalingGroups
      Resource: "*"

sg_ports:
  tcp:
    - "2379"
    - "9001-9004"
    - "9009-9011"
    - "9015-9016"
    - "9018-9019"
    - "9021-9022"
    - "9024"
    - "9029"
    - "12001"
    - "12002"
    - "17001-17004"
    - "17009-17011"
    - "17015-17016"
    - "17018-17019"
    - "17021"
    - "20002"
  udp:
    - "9002"
