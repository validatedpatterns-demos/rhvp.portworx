---
- name: Create temp directory for kubeconfig
  ansible.builtin.tempfile:
    state: directory
    prefix: bubble_teardown_
  register: _work_dir

- name: Tear down bubble test
  block:
    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ kubeconfig }}"
        dest: "{{ _work_dir.path }}/kubeconfig"
        mode: "0600"
      no_log: true

    - name: Find a running Stork pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        kind: Pod
        namespace: "{{ portworx_namespace }}"
        label_selectors:
          - "{{ stork_pod_label }}"
        field_selectors:
          - status.phase=Running
      register: _stork_pods

    - name: Fail if no Stork pod found
      ansible.builtin.fail:
        msg: "No running Stork pod found in {{ portworx_namespace }} namespace with label {{ stork_pod_label }}"
      when: _stork_pods.resources | length == 0

    - name: Set Stork pod name
      ansible.builtin.set_fact:
        _stork_pod: "{{ _stork_pods.resources[0].metadata.name }}"

    - name: Delete ApplicationClone via storkctl
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        namespace: "{{ portworx_namespace }}"
        pod: "{{ _stork_pod }}"
        command: >-
          {{ stork_binary_path }} delete applicationclone {{ bubble_clone_name }}
          --namespace {{ portworx_namespace }}
      failed_when: false

    - name: Delete bubble namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        api_version: v1
        kind: Namespace
        name: "{{ bubble_namespace }}"
        state: absent

    - name: Delete Stork clone ClusterRoleBinding
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: "{{ stork_clone_role_name }}"
        state: absent

    - name: Delete Stork clone ClusterRole
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: "{{ stork_clone_role_name }}"
        state: absent

  always:
    - name: Clean up temp directory
      ansible.builtin.file:
        path: "{{ _work_dir.path }}"
        state: absent
