---
- name: Create temp directory for kubeconfig
  ansible.builtin.tempfile:
    state: directory
    prefix: bubble_test_
  register: _work_dir

- name: Run bubble test clone
  block:
    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ kubeconfig }}"
        dest: "{{ _work_dir.path }}/kubeconfig"
        mode: "0600"
      no_log: true

    - name: Ensure bubble namespace exists
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ bubble_namespace }}"

    - name: Create ClusterRole for Stork clone operations
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: "{{ stork_clone_role_name }}"
          rules: "{{ stork_clone_rbac_rules }}"

    - name: Bind ClusterRole to Stork service account
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: "{{ stork_clone_role_name }}"
          subjects:
            - kind: ServiceAccount
              name: stork
              namespace: "{{ portworx_namespace }}"
          roleRef:
            kind: ClusterRole
            name: "{{ stork_clone_role_name }}"
            apiGroup: rbac.authorization.k8s.io

    - name: Find a running Stork pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        kind: Pod
        namespace: "{{ portworx_namespace }}"
        label_selectors:
          - "{{ stork_pod_label }}"
        field_selectors:
          - status.phase=Running
      register: _stork_pods

    - name: Fail if no Stork pod found
      ansible.builtin.fail:
        msg: "No running Stork pod found in {{ portworx_namespace }} namespace with label {{ stork_pod_label }}"
      when: _stork_pods.resources | length == 0

    - name: Set Stork pod name
      ansible.builtin.set_fact:
        _stork_pod: "{{ _stork_pods.resources[0].metadata.name }}"

    - name: Create ApplicationClone via storkctl
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        namespace: "{{ portworx_namespace }}"
        pod: "{{ _stork_pod }}"
        command: >-
          {{ stork_binary_path }} create applicationclone {{ bubble_clone_name }}
          --sourceNamespace {{ dr_namespace }}
          --destinationNamespace {{ bubble_namespace }}
          --replacePolicy Delete
          --namespace {{ portworx_namespace }}
      register: _create_clone_result
      failed_when: false

    - name: Verify clone was created or already exists
      ansible.builtin.fail:
        msg: "Failed to create ApplicationClone: {{ _create_clone_result.stderr | default(_create_clone_result.stdout | default('unknown error')) }}"
      when:
        - _create_clone_result.return_code != 0
        - "'already exists' not in (_create_clone_result.stderr | default('') + _create_clone_result.stdout | default(''))"

    - name: Wait for ApplicationClone to complete
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        api_version: stork.libopenstorage.org/v1alpha1
        kind: ApplicationClone
        name: "{{ bubble_clone_name }}"
        namespace: "{{ portworx_namespace }}"
      register: _clone_status
      until:
        - _clone_status.resources | length > 0
        - _clone_status.resources[0].status.status is defined
        - _clone_status.resources[0].status.status in ["Successful", "Successful with Warnings", "Failed"]
      retries: 60
      delay: 10

    - name: Verify clone completed successfully
      ansible.builtin.fail:
        msg: "ApplicationClone failed: {{ _clone_status.resources[0].status }}"
      when: _clone_status.resources[0].status.status not in ["Successful", "Successful with Warnings"]

  always:
    - name: Clean up temp directory
      ansible.builtin.file:
        path: "{{ _work_dir.path }}"
        state: absent
