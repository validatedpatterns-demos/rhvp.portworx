---
- name: Create temp directory for kubeconfig
  ansible.builtin.tempfile:
    state: directory
    prefix: bubble_test_
  register: _work_dir

- name: Run bubble test backup and restore
  block:
    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ kubeconfig }}"
        dest: "{{ _work_dir.path }}/kubeconfig"
        mode: "0600"
      no_log: true

    - name: Get cluster identity
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        api_version: config.openshift.io/v1
        kind: DNS
        name: cluster
      register: _cluster_dns

    - name: Set bucket name from cluster identity
      ansible.builtin.set_fact:
        _cluster_name: "{{ _cluster_dns.resources[0].spec.baseDomain.split('.')[0] }}"
        _bubble_bucket_name: "{{ s3_bucket_prefix }}-{{ _cluster_dns.resources[0].spec.baseDomain.split('.')[0] }}"

    - name: Create S3 bucket for bubble test backups
      amazon.aws.s3_bucket:
        aws_access_key_id: "{{ aws_access_key_id }}"
        aws_secret_access_key: "{{ aws_secret_access_key }}"
        name: "{{ _bubble_bucket_name }}"
        state: present
        region: "{{ s3_region }}"
        tags:
          portworx-bubble-test: "true"
          cluster: "{{ _cluster_name }}"

    - name: Create S3 credentials secret
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ bubble_backup_location_name }}-s3-creds"
            namespace: "{{ dr_namespace }}"
            annotations:
              stork.libopenstorage.org/skipresource: "true"
          stringData:
            region: "{{ s3_region }}"
            accessKeyID: "{{ aws_access_key_id }}"
            secretAccessKey: "{{ aws_secret_access_key }}"
            endpoint: "{{ s3_endpoint }}"
            disableSSL: "false"
      no_log: true

    - name: Create BackupLocation
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        state: present
        definition:
          apiVersion: stork.libopenstorage.org/v1alpha1
          kind: BackupLocation
          metadata:
            name: "{{ bubble_backup_location_name }}"
            namespace: "{{ dr_namespace }}"
            annotations:
              stork.libopenstorage.org/skipresource: "true"
          location:
            type: s3
            path: "{{ _bubble_bucket_name }}"
            secretConfig: "{{ bubble_backup_location_name }}-s3-creds"
            sync: false

    - name: Create ApplicationBackup
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        state: present
        definition:
          apiVersion: stork.libopenstorage.org/v1alpha1
          kind: ApplicationBackup
          metadata:
            name: "{{ bubble_backup_name }}"
            namespace: "{{ dr_namespace }}"
          spec:
            backupLocation: "{{ bubble_backup_location_name }}"
            namespaces:
              - "{{ dr_namespace }}"
            reclaimPolicy: Delete

    - name: Wait for ApplicationBackup to complete
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        api_version: stork.libopenstorage.org/v1alpha1
        kind: ApplicationBackup
        name: "{{ bubble_backup_name }}"
        namespace: "{{ dr_namespace }}"
      register: _backup_status
      until:
        - _backup_status.resources | length > 0
        - _backup_status.resources[0].status.status is defined
        - _backup_status.resources[0].status.status in ["Successful", "Failed"]
      retries: 60
      delay: 10

    - name: Verify backup completed successfully
      ansible.builtin.fail:
        msg: "ApplicationBackup failed: {{ _backup_status.resources[0].status }}"
      when: _backup_status.resources[0].status.status != "Successful"

    - name: Create ApplicationRestore
      kubernetes.core.k8s:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        state: present
        definition:
          apiVersion: stork.libopenstorage.org/v1alpha1
          kind: ApplicationRestore
          metadata:
            name: "{{ bubble_restore_name }}"
            namespace: "{{ dr_namespace }}"
          spec:
            backupName: "{{ bubble_backup_name }}"
            backupLocation: "{{ bubble_backup_location_name }}"
            namespaceMapping:
              "{{ dr_namespace }}": "{{ bubble_namespace }}"
            replacePolicy: Delete

    - name: Wait for ApplicationRestore to complete
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _work_dir.path }}/kubeconfig"
        api_version: stork.libopenstorage.org/v1alpha1
        kind: ApplicationRestore
        name: "{{ bubble_restore_name }}"
        namespace: "{{ dr_namespace }}"
      register: _restore_status
      until:
        - _restore_status.resources | length > 0
        - _restore_status.resources[0].status.status is defined
        - _restore_status.resources[0].status.status in ["Successful", "Successful with Warnings", "Failed"]
      retries: 60
      delay: 10

    - name: Verify restore completed successfully
      ansible.builtin.fail:
        msg: "ApplicationRestore failed: {{ _restore_status.resources[0].status }}"
      when: _restore_status.resources[0].status.status not in ["Successful", "Successful with Warnings"]

  always:
    - name: Clean up temp directory
      ansible.builtin.file:
        path: "{{ _work_dir.path }}"
        state: absent
